<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Antigravity Learning — Master AI Agent Development</title>
    <meta name="description" content="A premium learning experience for building AI agents, workflows, and skills. Interactive lessons, quizzes, and progress tracking — all free." />
    <meta name="keywords" content="AI agents, workflows, skills, autonomous agents, coding, learning platform" />

    <!-- Open Graph -->
    <meta property="og:title" content="Antigravity Learning — Master AI Agent Development" />
    <meta property="og:description" content="Interactive lessons on building AI agents, workflows, and skills. Free forever." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/hero.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Antigravity Learning" />
    <meta name="twitter:description" content="Master AI agent development with interactive lessons and quizzes." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#283A4A" />
    <link rel="canonical" href="https://antigravity-learning.web.app/" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Antigravity Learning",
      "url": "https://antigravity-learning.web.app",
      "description": "A premium learning experience for building AI agents, workflows, and skills.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://antigravity-learning.web.app/glossary?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Course",
      "name": "Master AI Agent Development",
      "description": "Interactive lessons on building AI agents, workflows, and skills. Includes quizzes of each module and a certificate of completion.",
      "provider": {
        "@type": "Organization",
        "name": "Antigravity Learning",
        "url": "https://antigravity-learning.web.app"
      },
      "isAccessibleForFree": true,
      "hasCourseInstance": [
        {
          "@type": "CourseInstance",
          "courseMode": "online",
          "name": "Workflows",
          "description": "Automate repetitive tasks with explicitly defined steps and shell commands."
        },
        {
          "@type": "CourseInstance",
          "courseMode": "online",
          "name": "Skills",
          "description": "Extend the agent's permanent knowledge base with custom paradigms and libraries."
        },
        {
          "@type": "CourseInstance",
          "courseMode": "online",
          "name": "Autonomous Agents",
          "description": "Learn how an agent executes tasks directly on your computer."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
